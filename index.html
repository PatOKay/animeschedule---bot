<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniSchedule | EST Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">AniSchedule</div>
        <div class="controls">
            <div class="tz-badge">EST Mode</div>
            <input type="text" id="animeSearch" placeholder="Filter this season...">
            <button id="toggleWatchlist">Watchlist (0)</button>
        </div>
    </header>

    <div class="live-selector-container">
        <div class="live-selector">
            <button class="nav-arrow" onclick="changeYear(-1)">❮</button>
            <div class="current-selection">
                <span id="displayYear">2026</span>
                <select id="seasonPicker" onchange="updateSeason()">
                    <option value="winter">Winter</option>
                    <option value="spring" selected>Spring</option>
                    <option value="summer">Summer</option>
                    <option value="fall">Fall</option>
                </select>
            </div>
            <button class="nav-arrow" onclick="changeYear(1)">❯</button>
        </div>
    </div>

    <main>
        <div id="anime-grid" class="grid-layout">
            <div class="loader">Connecting to Archive...</div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
