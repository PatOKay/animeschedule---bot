<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniSchedule | Seasonal Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='index.html'">AniSchedule</div>
        <div class="controls">
            <div class="tz-badge">EST Mode</div>
            <button id="themeToggle">🌓</button>
            <input type="text" id="animeSearch" placeholder="Search this season...">
            <button id="toggleWatchlist" class="primary-btn">Watchlist (0)</button>
        </div>
    </header>

    <nav class="season-nav">
        <a href="index.html?season=spring&year=2026" id="nav-spring-2026">Spring 2026</a>
        <a href="index.html?season=winter&year=2026" id="nav-winter-2026">Winter 2026</a>
        <a href="index.html?season=fall&year=2025" id="nav-fall-2025">Fall 2025</a>
        <a href="index.html?season=summer&year=2025" id="nav-summer-2025">Summer 2025</a>
    </nav>

    <main>
        <div class="season-header">
            <h2 id="pageTitle">Loading...</h2>
        </div>
        <div id="anime-grid" class="grid-layout">
            <div class="loader">Fetching data...</div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
