<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniSchedule | EST Archive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='index.html'">AniSchedule</div>
        <div class="controls">
            <div class="tz-badge">EST Mode</div>
            <button id="themeToggle">🌓</button>
            <input type="text" id="animeSearch" placeholder="Search this season...">
            <button id="toggleWatchlist" class="primary-btn">Watchlist (0)</button>
        </div>
    </header>

    <nav class="season-nav" id="mainNav">
        </nav>

    <main>
        <div class="season-header">
            <h2 id="pageTitle">PREPARING...</h2>
        </div>
        <div id="anime-grid" class="grid-layout">
            <div class="loader">Connecting to Archive...</div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
