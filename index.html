<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniSchedule | Ultimate EST Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo" onclick="location.reload()">AniSchedule</div>
        <div class="controls">
            <div class="tz-badge">EST Mode</div>
            <input type="text" id="globalSearch" placeholder="Search any anime...">
            <div class="filter-wrapper">
                <button id="filterBtn" class="icon-btn">☰ Filter</button>
                <div id="filterMenu" class="filter-content">
                    <button onclick="sortData('pop')">Most Popular</button>
                    <button onclick="sortData('score')">Highest Rated</button>
                    <button onclick="sortData('alpha')">Alphabetical (A-Z)</button>
                </div>
            </div>
            <button id="toggleWatchlist">Watchlist (<span id="wCount">0</span>)</button>
        </div>
    </header>

    <div class="live-selector-container">
        <div class="selector-row">
            <button class="nav-arrow" onclick="changeYear(-1)">❮</button>
            <div class="current-selection">
                <span id="displayYear">2026</span>
                <select id="seasonPicker" onchange="updateSeason()">
                    <option value="winter">Winter</option>
                    <option value="spring" selected>Spring</option>
                    <option value="summer">Summer</option>
                    <option value="fall">Fall</option>
                </select>
            </div>
            <button class="nav-arrow" onclick="changeYear(1)">❯</button>
        </div>
    </div>

    <main>
        <h2 id="viewTitle" style="padding: 0 5%; color: #3db4f2;">SPRING 2026</h2>
        <div id="anime-grid" class="grid-layout">
            <div class="loader">Fetching Cards...</div>
        </div>
    </main>

    <button id="snapTop" title="Go to top">↑</button>

    <div id="animeModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
