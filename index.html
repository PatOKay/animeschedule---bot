<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniSchedule | Cloud Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo" onclick="location.reload()">AniSchedule</div>
        <div class="controls">
            <div class="tz-badge">EST Mode</div>
            <input type="text" id="globalSearch" placeholder="Search any anime...">
            <div class="filter-wrapper">
                <button id="filterBtn" class="icon-btn">☰ Filter</button>
                <div id="filterMenu" class="filter-content">
                    <button onclick="sortData('pop')">Most Popular</button>
                    <button onclick="sortData('score')">Highest Rated</button>
                    <button onclick="sortData('alpha')">Alphabetical (A-Z)</button>
                </div>
            </div>
            <button id="toggleWatchlist">Watchlist (<span id="wCount">0</span>)</button>
        </div>
    </header>

    <div class="live-selector-container">
        <div class="selector-row">
            <button class="nav-arrow" onclick="changeYear(-1)">❮</button>
            <div class="current-selection">
                <span id="displayYear">2026</span>
                <select id="seasonPicker" onchange="updateSeason()">
                    <option value="winter">Winter</option>
                    <option value="spring" selected>Spring</option>
                    <option value="summer">Summer</option>
                    <option value="fall">Fall</option>
                </select>
            </div>
            <button class="nav-arrow" onclick="changeYear(1)">❯</button>
        </div>
    </div>

    <main>
        <h2 id="viewTitle" style="padding: 0 5%; color: #3db4f2;">SPRING 2026</h2>
        <div id="anime-grid" class="grid-layout">
            <div class="loader">Connecting to Database...</div>
        </div>
    </main>

    <button id="snapTop" title="Go to top">↑</button>

    <div id="animeModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <div id="authOverlay" class="modal" style="display: flex;">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <h2>Member Login</h2>
        <input type="email" id="email" placeholder="Email" style="width:90%; padding:10px; margin:10px 0;">
        <input type="password" id="password" placeholder="Password" style="width:90%; padding:10px; margin:10px 0;">
        <button id="loginBtn" style="width:95%; padding:10px; background:#3db4f2; border:none; color:white; font-weight:bold; cursor:pointer;">Login / Sign Up</button>
        <p id="authMsg" style="color: #ff4d6d; font-size: 0.8rem;"></p>
    </div>
</div>

<div id="pirateSidebar" class="sidebar">
    <button class="close-sidebar" onclick="toggleSidebar()">&times;</button>
    <h3>🏴‍☠️ Streaming Archive</h3>
    <ul class="pirate-list">
        <li><a href="https://aniwave.to" target="_blank">AniWave</a></li>
        <li><a href="https://hianime.to" target="_blank">HiAnime</a></li>
        <li><a href="https://gogoanime3.co" target="_blank">GogoAnime</a></li>
        <li><a href="https://9animetv.to" target="_blank">9Anime</a></li>
    </ul>
</div>

<button id="sidebarBtn" style="display:none;" onclick="toggleSidebar()">📂 Sites</button>
</body>
</html>
