<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Anime Schedule Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
<header class="site-header">
  <h1>Anime Schedule Tracker</h1>
  <p>Upcoming episodes, seasons, and releases</p>
</header>

<section class="controls">
  <select id="seasonFilter">
    <option value="all">All Seasons</option>
    <option value="Winter">Winter</option>
    <option value="Spring">Spring</option>
    <option value="Summer">Summer</option>
    <option value="Fall">Fall</option>
  </select>
</section>

<main id="animeGrid"></main>
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniSchedule | Calendar & Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <div class="logo">AniSchedule</div>
    <div class="controls">
        <div class="tz-badge">EST Mode (UTC-5)</div>
        <button id="themeToggle">🌓</button>
        <input type="text" id="animeSearch" placeholder="Search across seasons...">
        <button id="toggleWatchlist" class="primary-btn">Watchlist (0)</button>
    </div>
</header>

<nav class="season-nav">
    <a href="#season-spring-2026">Spring 2026</a>
    <a href="#season-winter-2026">Winter 2026</a>
    <a href="#season-fall-2025">Fall 2025</a>
    <a href="#season-summer-2025">Summer 2025</a>
</nav>

<main id="seasonal-container">
    </main>
</body>
</html>
